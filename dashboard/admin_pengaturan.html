<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../assets/img/logo.png" type="image/x-icon" />
    <title>Supplier Hub - Admin Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwindcss.config = {
        darkMode: 'class'
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin_common.js"></script>
    <script src="../assets/js/darkmode.js"></script>
    <link rel="stylesheet" href="../assets/css/darkmode.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      :root.dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #1f2937;
      }

      :root.dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #4b5563;
      }

      :root.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }

      :root.dark body {
        background-color: #111827;
        color: #f3f4f6;
      }

      :root.dark #app-content {
        background-color: #111827;
      }

      :root.dark header {
        background-color: #1f2937;
        border-bottom-color: #374151;
      }

      :root.dark .bg-white {
        background-color: #1f2937;
      }

      :root.dark .bg-slate-50 {
        background-color: #374151;
      }

      :root.dark .text-slate-900 {
        color: #f3f4f6;
      }

      :root.dark .text-slate-600 {
        color: #d1d5db;
      }

      :root.dark .text-slate-500 {
        color: #9ca3af;
      }

      :root.dark .border-slate-200 {
        border-color: #374151;
      }

      :root.dark .border-slate-100 {
        border-color: #374151;
      }

      :root.dark input {
        background-color: #374151;
        color: #f3f4f6;
      }

      :root.dark input::placeholder {
        color: #9ca3af;
      }

      :root.dark #sidebar {
        background-color: #1f2937;
        border-right-color: #374151;
      }

      :root.dark .bg-slate-900 {
        background-color: #1f2937;
      }

      :root.dark .bg-slate-800 {
        background-color: #374151;
      }

      :root.dark .hover\:bg-slate-800:hover {
        background-color: #2d3748;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-900 selection:bg-emerald-100 selection:text-emerald-900 overflow-hidden"
  >
    <div id="app-content" class="min-h-screen flex invisible">
      <!-- Sidebar - Admin Theme (Navy) -->
      <aside
        id="sidebar"
        class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white transition-all duration-300 transform lg:relative lg:translate-x-0 border-r border-slate-800 flex flex-col"
      >
        <div class="p-8 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center">
              <img
                src="../assets/img/logo.png"
                alt="Logo SupplierHub"
                class="w-12 h-12 object-contain"
              />
            </div>
            <span class="text-xl font-bold tracking-tight"
              >SUPPLIER<span class="text-emerald-400">HUB</span></span
            >
          </div>
          <button onclick="toggleSidebar()" class="lg:hidden text-slate-400">
            <i data-lucide="x"></i>
          </button>
        </div>

        <nav
          class="mt-4 px-6 space-y-1.5 flex-1 overflow-y-auto custom-scrollbar"
        >
          <p
            class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4"
          >
            ADMIN MENU
          </p>
          <a
            href="admin.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i
              data-lucide="layout-dashboard"
              class="group-hover:text-emerald-400"
            ></i>
            <span class="font-semibold text-sm">Overview</span>
          </a>
          <a
            href="admin_daftar_supplier.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="users" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Daftar Supplier</span>
          </a>
          <a
            href="admin_kontrol_stok.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="package" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Kontrol Stok</span>
          </a>
          <a
            href="admin_keuangan.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i
              data-lucide="bar-chart-3"
              class="group-hover:text-emerald-400"
            ></i>
            <span class="font-semibold text-sm">Keuangan</span>
          </a>
          <a
            href="admin_pengaturan.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group bg-emerald-600 text-white shadow-xl shadow-emerald-900/40"
          >
            <i data-lucide="settings" class="text-white"></i>
            <span class="font-semibold text-sm">Pengaturan</span>
          </a>
        </nav>

        <div class="px-6 pb-8">
          <button
            onclick="logoutUser('../Login/login.html')"
            class="w-full flex items-center justify-between px-4 py-3 text-slate-400 hover:text-red-400 transition-colors group"
          >
            <div class="flex items-center gap-3">
              <i data-lucide="log-out" size="20"></i>
              <span class="font-semibold text-sm">Keluar Sistem</span>
            </div>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header
          class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40"
        >
          <div class="flex items-center gap-4">
            <button
              onclick="toggleSidebar()"
              class="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg"
            >
              <i data-lucide="menu"></i>
            </button>
            <div>
              <h1 class="text-xl font-bold text-slate-900 tracking-tight">
                Pengaturan
              </h1>
              <p class="text-xs text-slate-500 hidden md:block">
                Selamat datang, Superadmin. Monitor aktivitas platform.
              </p>
            </div>
          </div>
          <div class="flex items-center gap-6">
            <div
              class="hidden md:flex items-center bg-slate-50 rounded-xl px-4 py-2.5 w-72 border border-slate-200 focus-within:border-emerald-500 focus-within:bg-white focus-within:ring-4 focus-within:ring-emerald-500/5 transition-all"
            >
              <i data-lucide="search" class="text-slate-400 w-4 h-4"></i>
              <input
                type="text"
                placeholder="Cari Data..."
                class="bg-transparent border-none focus:ring-0 text-sm w-full ml-2 outline-none placeholder:text-slate-400 text-slate-700"
              />
            </div>
            <button 
              onclick="DarkModeToggle.toggle()"
              class="theme-toggle-btn"
              title="Toggle Dark Mode"
            >
              <i class="fas fa-moon"></i>
            </button>
            <div class="flex items-center gap-3">
              <div class="flex items-center gap-3 pl-2">
                <div class="text-right hidden sm:block">
                  <p
                    id="user-display-name"
                    class="text-sm font-bold text-slate-900 leading-none"
                  >
                    Admin
                  </p>
                  <p
                    class="text-[10px] text-emerald-600 font-black uppercase tracking-widest mt-1.5"
                  >
                    Role: ADMIN
                  </p>
                </div>
                <div
                  class="w-11 h-11 rounded-xl bg-emerald-50 border-2 border-white shadow-sm overflow-hidden ring-1 ring-slate-200 flex py-1 justify-center"
                >
                  <i
                    data-lucide="shield-check"
                    class="text-emerald-600 w-7 h-7 mt-1.5"
                  ></i>
                </div>
              </div>
            </div>
          </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
          <div
            class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8"
          >
            <div>
              <h2 class="text-2xl font-black text-slate-900 tracking-tight">
                Pengaturan Sistem
              </h2>
              <p class="text-slate-500 text-sm">
                Konfigurasi preferensi platform dan keamanan.
              </p>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-2">
              <button
                type="button"
                onclick="setSettingsTab('profile')"
                data-settings-tab="profile"
                class="w-full text-left px-6 py-4 rounded-2xl bg-emerald-50 text-emerald-700 font-bold border border-emerald-100 flex items-center gap-3"
              >
                <i data-lucide="user" class="w-5 h-5"></i> Profil Admin
              </button>
              <button
                type="button"
                onclick="setSettingsTab('notifications')"
                data-settings-tab="notifications"
                class="w-full text-left px-6 py-4 rounded-2xl text-slate-600 font-semibold hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-all flex items-center gap-3"
              >
                <i data-lucide="bell" class="w-5 h-5"></i> Notifikasi
              </button>
              <button
                type="button"
                onclick="setSettingsTab('security')"
                data-settings-tab="security"
                class="w-full text-left px-6 py-4 rounded-2xl text-slate-600 font-semibold hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-all flex items-center gap-3"
              >
                <i data-lucide="shield" class="w-5 h-5"></i> Keamanan
              </button>
            </div>

            <div class="lg:col-span-2">
              <div
                class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden p-8"
              >
                <h3 class="text-lg font-black text-slate-900 mb-6">
                  Informasi Profil
                </h3>

                <form id="admin-profile-form" class="space-y-6">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label class="block text-sm font-bold text-slate-700 mb-2"
                        >Nama Lengkap</label
                      >
                      <input
                        id="admin-profile-name"
                        type="text"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all text-slate-600"
                      />
                    </div>
                    <div>
                      <label class="block text-sm font-bold text-slate-700 mb-2"
                        >Email</label
                      >
                      <input
                        id="admin-profile-email"
                        type="email"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all text-slate-600"
                      />
                    </div>
                  </div>

                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2"
                      >Password</label
                    >
                    <input
                      id="admin-current-password"
                      type="password"
                      placeholder="Password saat ini"
                      class="w-full px-4 py-3 mb-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all text-slate-600"
                    />
                    <input
                      id="admin-new-password"
                      type="password"
                      placeholder="Kosongkan jika tidak ingin mengubah"
                      class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all text-slate-600"
                    />
                  </div>

                  <div class="pt-4 flex justify-end">
                    <button
                      type="submit"
                      id="admin-profile-submit"
                      class="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-600/20 transition-all"
                    >
                      Simpan Perubahan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let currentAdminProfile = null;

      function setSettingsTab(tab) {
        document.querySelectorAll("[data-settings-tab]").forEach((button) => {
          const active = button.dataset.settingsTab === tab;
          button.className = active
            ? "w-full text-left px-6 py-4 rounded-2xl bg-emerald-50 text-emerald-700 font-bold border border-emerald-100 flex items-center gap-3"
            : "w-full text-left px-6 py-4 rounded-2xl text-slate-600 font-semibold hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-all flex items-center gap-3";
        });

        if (tab === "notifications") {
          AdminDashboard.notify("info", "Notifikasi admin aktif untuk verifikasi supplier, stok, dan transaksi.");
        }
        if (tab === "security") {
          AdminDashboard.notify("info", "Keamanan admin memakai JWT dan update password dari form profil.");
        }
      }

      async function loadAdminProfile() {
        const response = await AdminDashboard.apiFetch("/api/admin/profile");
        currentAdminProfile = response.data || response;

        document.getElementById("admin-profile-name").value =
          currentAdminProfile.business_name || "";
        document.getElementById("admin-profile-email").value =
          currentAdminProfile.email || "";
      }

      async function submitAdminProfile(event) {
        event.preventDefault();

        const submitButton = document.getElementById("admin-profile-submit");
        submitButton.disabled = true;
        submitButton.textContent = "Menyimpan...";

        try {
          const payload = {
            business_name: document.getElementById("admin-profile-name").value.trim(),
            email: document.getElementById("admin-profile-email").value.trim(),
            current_password: document.getElementById("admin-current-password").value,
            new_password: document.getElementById("admin-new-password").value,
          };

          const response = await AdminDashboard.apiFetch("/api/admin/profile", {
            method: "PUT",
            body: JSON.stringify(payload),
          });
          const profile = response.data || response;
          currentAdminProfile = profile;

          const session = getStoredUserSession();
          if (session) {
            saveUserSession({
              ...session,
              business_name: profile.business_name || session.business_name,
              name: profile.business_name || session.name,
              email: profile.email || session.email,
            });
          }

          document.getElementById("user-display-name").textContent =
            profile.business_name || profile.email || "Admin";
          document.getElementById("admin-current-password").value = "";
          document.getElementById("admin-new-password").value = "";
          AdminDashboard.notify("success", response.message || "Profil admin berhasil diperbarui.");
        } catch (error) {
          AdminDashboard.notify("danger", error.message);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Simpan Perubahan";
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        AdminDashboard.initPage({
          onReady: async () => {
            const form = document.getElementById("admin-profile-form");
            if (form) form.addEventListener("submit", submitAdminProfile);
            setSettingsTab("profile");
            await loadAdminProfile().catch((err) => {
              console.error("Gagal memuat profil admin", err);
              AdminDashboard.notify("danger", err.message);
            });
          },
        });
      });

      window.setSettingsTab = setSettingsTab;
    </script>
  </body>
</html>
