  <script>
    function toggleSidebar() {
      document
        .getElementById("sidebar")
        .classList.toggle("-translate-x-full");
    }

    let activeStatusFilter = "all";
    let allOrders = [];
    const orderPagination = SupplierHubPagination.create({
      pageSize: 5,
      itemLabel: "pesanan",
    });

    const statusFilters = {
      all: [],
      pending: [
        "pending",
        "pending_supplier_confirmation",
        "supplier_confirmed",
        "payment_pending",
        "payment_request_failed",
      ],
      processing: ["paid", "processing"],
      shipped: ["shipped", "shipment_created"],
      completed: ["completed"],
      cancelled: ["cancelled", "rejected_by_supplier", "stock_unavailable"],
    };

    const filterButtonBaseClass =
      "order-filter px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-colors";
    const filterButtonActiveClass = `${filterButtonBaseClass} bg-slate-900 text-white`;
    const filterButtonIdleClass = `${filterButtonBaseClass} bg-white border border-slate-200 text-slate-600 hover:bg-slate-50`;

    function getSessionToken() {
      const userSession = getStoredUserSession();
      return userSession ? userSession.token : null;
    }

    function jsArg(value) {
      return `'${String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'")}'`;
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(
        /[&<>"']/g,
        (char) =>
          ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          })[char],
      );
    }

    function formatRupiah(value) {
      return new Intl.NumberFormat("id-ID", {
        style: "currency",
        currency: "IDR",
        minimumFractionDigits: 0,
      }).format(Number(value || 0));
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("id-ID").format(Number(value) || 0);
    }

    function normalizeStatus(status) {
      return String(status || "").toLowerCase();
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-check text-emerald-600 mr-1"></i><span class="text-emerald-600">Tersalin</span>`;
        setTimeout(() => {
          btn.innerHTML = originalText;
        }, 2000);
      }).catch(err => {
        console.error("Gagal menyalin text", err);
      });
    }

    function isOrderInFilter(order, filter) {
      if (filter === "all") return true;
      return (statusFilters[filter] || []).includes(normalizeStatus(order.status));
    }

    function filteredOrders() {
      return allOrders.filter((order) => isOrderInFilter(order, activeStatusFilter));
    }

    function getOrderCounts() {
      return {
        all: allOrders.length,
        pending: allOrders.filter((order) => isOrderInFilter(order, "pending")).length,
        processing: allOrders.filter((order) => isOrderInFilter(order, "processing")).length,
        shipped: allOrders.filter((order) => isOrderInFilter(order, "shipped")).length,
        completed: allOrders.filter((order) => isOrderInFilter(order, "completed")).length,
        cancelled: allOrders.filter((order) => isOrderInFilter(order, "cancelled")).length,
      };
    }

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) element.textContent = value;
    }

    function getStatusMeta(status) {
      const normalized = String(status || "").toLowerCase();
      const map = {
        pending: {
          label: "PENDING",
          color: "bg-yellow-50 text-yellow-600",
          icon: "clock",
        },
        pending_supplier_confirmation: {
          label: "MENUNGGU SUPPLIER",
          color: "bg-orange-50 text-orange-600",
          icon: "clock",
        },
        supplier_confirmed: {
          label: "STOK DIKONFIRMASI",
          color: "bg-teal-50 text-teal-600",
          icon: "package-check",
        },
        payment_pending: {
          label: "MENUNGGU BAYAR",
          color: "bg-amber-50 text-amber-600",
          icon: "credit-card",
        },
        payment_request_failed: {
          label: "PAYMENT GAGAL",
          color: "bg-red-50 text-red-600",
          icon: "x-circle",
        },
        paid: {
          label: "DIBAYAR",
          color: "bg-emerald-50 text-emerald-600",
          icon: "credit-card",
        },
        processing: {
          label: "DIPROSES",
          color: "bg-indigo-50 text-indigo-600",
          icon: "package-check",
        },
        shipped: {
          label: "DIKIRIM",
          color: "bg-blue-50 text-blue-600",
          icon: "truck",
        },
        shipment_created: {
          label: "DIKIRIM",
          color: "bg-blue-50 text-blue-600",
          icon: "truck",
        },
        completed: {
          label: "SELESAI",
          color: "bg-emerald-50 text-emerald-600",
          icon: "check-circle-2",
        },
        cancelled: {
          label: "BATAL",
          color: "bg-red-50 text-red-600",
          icon: "x-circle",
        },
        rejected_by_supplier: {
          label: "DITOLAK",
          color: "bg-red-50 text-red-600",
          icon: "x-circle",
        },
        stock_unavailable: {
          label: "STOK HABIS",
          color: "bg-red-50 text-red-600",
          icon: "x-circle",
        },
      };
      return (
        map[normalized] || {
          label: normalized.toUpperCase() || "UNKNOWN",
          color: "bg-slate-100 text-slate-600",
          icon: "package",
        }
      );
    }

    function updateOrderSummary() {
      const counts = getOrderCounts();
      setText("orders-total-count", formatNumber(counts.all));
      setText("orders-pending-count", formatNumber(counts.pending));
      setText("orders-shipped-count", formatNumber(counts.shipped));
      setText("orders-completed-count", formatNumber(counts.completed));

      Object.entries(counts).forEach(([key, value]) => {
        setText(`filter-count-${key}`, formatNumber(value));
      });
    }

    function updateFilterButtons() {
      document.querySelectorAll(".order-filter").forEach((btn) => {
        const active = btn.dataset.statusFilter === activeStatusFilter;
        btn.className = active ? filterButtonActiveClass : filterButtonIdleClass;

        const countBadge = btn.querySelector("span");
        if (countBadge) {
          countBadge.className = active
            ? "ml-2 rounded-lg bg-white/20 px-2 py-0.5 text-[10px] text-white"
            : "ml-2 rounded-lg bg-slate-100 px-2 py-0.5 text-[10px] text-slate-600";
        }
      });
    }

    function setOrderFilter(status) {
      activeStatusFilter = status;
      updateFilterButtons();
      renderOrders(filteredOrders());
    }

    function renderAction(order) {
      const orderID = jsArg(order.id);
      const status = normalizeStatus(order.status);
      if (["pending", "pending_supplier_confirmation"].includes(status)) {
        return `
                    <div class="flex flex-wrap gap-2 mt-2 justify-end">
                        <button onclick="cancelOrder(${orderID})" class="px-4 py-2 bg-white border border-red-100 text-red-600 rounded-xl text-xs font-bold hover:bg-red-50 transition-colors">Batalkan</button>
                    </div>
                `;
      }
      if (status === "payment_pending" && order.payment) {
        const ref = jsArg(order.payment.payment_reference);
        return `
                    <div class="flex flex-wrap gap-2 mt-2 justify-end">
                        <button onclick="cancelOrder(${orderID})" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-50 transition-colors">Batalkan</button>
                        <button onclick="simulatePayment(${ref}, ${orderID})" class="px-4 py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-600/20">Bayar (Simulasi)</button>
                    </div>
                `;
      }
      if (["shipped", "shipment_created", "paid"].includes(status)) {
        return `
                    <div class="flex flex-wrap gap-2 mt-2 justify-end">
                        <a href="umkm_lacak_paket.html" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/20">Lacak Paket</a>
                        <button onclick="completeOrder(${orderID})" class="px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-colors">Terima</button>
                    </div>
                `;
      }
      if (status === "completed") {
        const productName = order.product ? order.product.name : "Bahan Baku";
        const prodName = jsArg(productName);
        const prodID = jsArg(order.product_id);
        const btnUlasan = order.is_reviewed 
          ? `<span class="px-4 py-2 bg-slate-100 text-slate-400 dark:bg-slate-700 dark:text-slate-400 rounded-xl text-xs font-bold mt-2 inline-block">Sudah Diulas</span>`
          : `<button onclick="openReviewModal(${orderID}, ${prodID}, ${prodName})" class="px-4 py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-600/20 mt-2 inline-block">Beri Ulasan</button>`;
        return `
                    <div class="flex flex-wrap gap-2 mt-2 justify-end items-center">
                        <a href="umkm_katalog.html" class="px-4 py-2 bg-white border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50 transition-colors shadow-sm mt-2 inline-block">Beli Lagi</a>
                        ${btnUlasan}
                    </div>
                `;
      }
      return `
                        <a href="umkm_katalog.html" class="px-4 py-2 bg-white border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50 transition-colors shadow-sm mt-2 inline-block">Beli Lagi</a>
            `;
    }

    async function simulatePayment(paymentReference, orderID) {
      if (!await showConfirm("Simulasikan pelunasan pembayaran untuk pesanan ini di SmartBank?")) return;

      if (typeof showToast === "function") showToast("info", "Memproses simulasi pembayaran...");

      try {
        const res = await fetch(buildApiUrl("/smartbank/payment/simulate-callback"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            payment_reference: paymentReference,
            order_id: orderID,
            status: "success"
          })
        });

        const result = await res.json();
        if (res.ok && result.success) {
          showAlert("Simulasi pembayaran sukses! Status pesanan Anda telah diperbarui menjadi Dibayar & Pengiriman telah dibuat.");
          fetchOrders();
        } else {
          throw new Error(result.error || "Gagal memproses simulasi callback");
        }
      } catch (err) {
        showToast("danger", "Gagal melakukan simulasi: " + err.message);
      }
    }

    function renderOrders(orders, options = {}) {
      const container = document.getElementById("ordersContainer");
      container.innerHTML = "";
      const orderList = Array.isArray(orders) ? orders : [];
      if (!options.preservePage) SupplierHubPagination.reset(orderPagination);
      const pageData = SupplierHubPagination.getPage(orderList, orderPagination);

      if (orderList.length === 0) {
        container.innerHTML =
          '<div class="text-center p-8 bg-white rounded-3xl border border-slate-100"><p class="text-slate-500 font-medium">Belum ada pesanan untuk filter ini.</p><a href="umkm_katalog.html" class="inline-block mt-4 px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold">Mulai Belanja</a></div>';
        SupplierHubPagination.render("ordersPagination", orderPagination, [], {
          itemLabel: "pesanan",
        });
        return;
      }

      pageData.items.forEach((order) => {
        const product = order.product || {};
        const supplier = product.supplier || {};
        const statusMeta = getStatusMeta(order.status);
        const productName = escapeHTML(product.name || "Produk");
        const supplierName = escapeHTML(supplier.business_name || "Supplier");
        const imageURL = escapeHTML(
          product.image_url || "../assets/img/logo.png",
        );
        const basePriceFormatted = formatRupiah(product.price);
        const priceFormatted = formatRupiah(order.grand_total);
        const shortId = String(order.id || "")
          .substring(0, 8)
          .toUpperCase();

        let paymentDetailsHtml = "";
        if (normalizeStatus(order.status) === "payment_pending" && order.payment) {
          paymentDetailsHtml = `
              <div class="mt-4 p-5 bg-gradient-to-br from-indigo-50/50 to-slate-50/50 dark:from-slate-800/40 dark:to-slate-900/40 rounded-2xl border border-indigo-100/60 dark:border-slate-700/60 shadow-sm">
                <!-- Header: SmartBank Info -->
                <div class="flex items-center justify-between mb-4 border-b border-indigo-100/30 pb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-extrabold text-[10px] shadow-md shadow-indigo-600/10">
                      SB
                    </div>
                    <div>
                      <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Metode Pembayaran</p>
                      <p class="text-[11px] font-bold text-slate-700 dark:text-slate-200">SmartBank Virtual Account</p>
                    </div>
                  </div>
                  <span class="inline-flex items-center gap-1.5 rounded-full bg-amber-500/10 px-2 py-0.5 text-[9px] font-bold text-amber-600 dark:text-amber-400 ring-1 ring-amber-500/20">
                    <span class="h-1.5 w-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                    Menunggu Bayar
                  </span>
                </div>
                
                <!-- Main Details: Virtual Account & Copy -->
                <div class="space-y-3">
                  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                    <div>
                      <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Nomor Virtual Account</span>
                      <p class="text-lg font-black font-mono text-indigo-600 dark:text-indigo-400 tracking-widest mt-0.5">${escapeHTML(order.payment.virtual_account || "-")}</p>
                    </div>
                    <button onclick="copyToClipboard('${escapeHTML(order.payment.virtual_account || "")}', this)" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-indigo-400 rounded-xl text-xs font-bold transition-all shadow-sm border border-indigo-100/30">
                      <i class="fa-regular fa-copy"></i>
                      <span>Salin</span>
                    </button>
                  </div>
                  
                  <div class="flex justify-between items-center text-xs border-t border-indigo-100/30 pt-3">
                    <span class="font-medium text-slate-400">Referensi Pembayaran:</span>
                    <span class="font-mono font-bold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded text-[10px]">${escapeHTML(order.payment.payment_reference || "-")}</span>
                  </div>
                </div>
              </div>
            `;
        }

        container.innerHTML += `
                    <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm transition-all hover:shadow-md">
                        <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-50">
                            <div class="flex items-center gap-3">
                                <i data-lucide="store" class="text-emerald-600 w-5 h-5"></i>
                                <span class="font-bold text-slate-900">${supplierName}</span>
                            </div>
                            <span class="text-[10px] font-black px-3 py-1 rounded-full ${statusMeta.color}">${statusMeta.label}</span>
                        </div>
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="w-20 h-20 bg-slate-100 rounded-xl flex-shrink-0 flex justify-center items-center overflow-hidden">
                                <img src="${imageURL}" alt="${productName}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <i data-lucide="package" class="w-8 h-8 text-slate-300 hidden"></i>
                            </div>
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">ORD-${shortId}</p>
                                <h4 class="font-bold text-slate-900">${productName}</h4>
                                <p class="text-sm text-slate-500 mt-1">${Number(order.quantity || 0)} x ${basePriceFormatted}</p>
                                ${paymentDetailsHtml}
                            </div>
                            <div class="text-left md:text-right flex flex-col justify-between md:items-end">
                                <div>
                                    <p class="text-xs text-slate-500 font-bold mb-1">Total Belanja</p>
                                    <p class="font-black text-emerald-600 text-lg">${priceFormatted}</p>
                                </div>
                                ${renderAction(order)}
                            </div>
                        </div>
                    </div>
                `;
      });
      SupplierHubPagination.render("ordersPagination", orderPagination, orderList, {
        itemLabel: "pesanan",
        onPageChange: () => renderOrders(orderList, { preservePage: true }),
      });
      lucide.createIcons();
    }

    async function fetchOrders() {
      const token = getSessionToken();
      if (!token) return;

      try {
        const res = await fetch(buildApiUrl("/api/user/orders"), {
          headers: { Authorization: `Bearer ${token}` },
        });
        const result = await res.json();
        if (res.ok) {
          allOrders = result.data || [];
          updateOrderSummary();
          updateFilterButtons();
          renderOrders(filteredOrders());
        } else {
          throw new Error(result.error || "Gagal memuat pesanan");
        }
      } catch (err) {
        console.error("Gagal memuat pesanan", err);
        document.getElementById("ordersContainer").innerHTML =
          `<div class="text-center p-8 bg-white rounded-3xl border border-red-100 text-red-500 font-bold">${escapeHTML(err.message)}</div>`;
        SupplierHubPagination.render("ordersPagination", orderPagination, [], {
          itemLabel: "pesanan",
        });
      }
    }

    async function updateOrderStatus(orderID, action) {
      const token = getSessionToken();
      if (!token) return;

      try {
        const res = await fetch(
          buildApiUrl(
            `/api/user/orders/${encodeURIComponent(orderID)}/${action}`,
          ),
          {
            method: "PUT",
            headers: { Authorization: `Bearer ${token}` },
          },
        );
        const result = await res.json();
        if (!res.ok)
          throw new Error(result.error || "Gagal memperbarui pesanan");
        fetchOrders();
      } catch (err) {
        showToast("danger", err.message);
      }
    }

    async function cancelOrder(orderID) {
      if (
        await showConfirm("Batalkan pesanan ini? Stok akan dikembalikan ke katalog.")
      ) {
        updateOrderStatus(orderID, "cancel");
      }
    }

    async function completeOrder(orderID) {
      if (await showConfirm("Konfirmasi paket sudah diterima?")) {
        updateOrderStatus(orderID, "complete");
      }
    }

    let currentReviewRating = 0;

    function openReviewModal(orderID, productID, productName) {
      document.getElementById("reviewOrderId").value = orderID;
      document.getElementById("reviewProductId").value = productID;
      document.getElementById("reviewProductName").textContent = productName;
      document.getElementById("reviewComment").value = "";
      setRating(0); // Reset rating to 0
      
      const modal = document.getElementById("reviewModal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      lucide.createIcons();
    }

    function closeReviewModal() {
      const modal = document.getElementById("reviewModal");
      modal.classList.remove("flex");
      modal.classList.add("hidden");
    }

    function setRating(val) {
      currentReviewRating = val;
      const stars = document.querySelectorAll("#starRatingContainer .star-btn");
      stars.forEach((btn, index) => {
        const svg = btn.querySelector("svg");
        if (svg) {
          if (index < val) {
            svg.classList.add("text-yellow-400");
            svg.classList.remove("text-slate-300");
          } else {
            svg.classList.remove("text-yellow-400");
            svg.classList.add("text-slate-300");
          }
        }
      });
    }

    async function submitReview() {
      const orderID = document.getElementById("reviewOrderId").value;
      const productID = document.getElementById("reviewProductId").value;
      const comment = document.getElementById("reviewComment").value.trim();
      const token = getSessionToken();

      if (!token) return;

      if (currentReviewRating < 1 || currentReviewRating > 5) {
        showToast("warning", "Silakan pilih rating bintang terlebih dahulu (1 - 5)");
        return;
      }

      try {
        const res = await fetch(buildApiUrl("/api/user/reviews"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            order_id: orderID,
            rating: currentReviewRating,
            comment: comment
          })
        });

        let result;
        const contentType = res.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          result = await res.json();
        }

        if (!res.ok) {
          const errMsg = (result && result.error) ? result.error : `Gagal mengirim ulasan (Status: ${res.status})`;
          throw new Error(errMsg);
        }

        showToast("success", "Ulasan berhasil dikirim!");
        closeReviewModal();
        fetchOrders(); // Refresh order list to show "Sudah Diulas"
      } catch (err) {
        showToast("danger", err.message);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const user = checkAuth("../Login/login.html");
      if (user) {
        if (user.role !== "user") {
          window.location.href = "../Login/login.html";
        } else {
          document.getElementById("user-display-name").innerText =
            user.name || user.email || "UMKM";
          const dateEl = document.getElementById("current-date");
          if (dateEl)
            dateEl.innerText = new Date().toLocaleDateString("id-ID", {
              day: "numeric",
              month: "long",
              year: "numeric",
            });
          document
            .getElementById("app-content")
            .classList.remove("invisible");
          lucide.createIcons();
          fetchOrders();
        }
      }
    });
  </script>
</body>

</html>
