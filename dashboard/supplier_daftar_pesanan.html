<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../assets/img/logo.png" type="image/x-icon" />
    <title>Supplier Hub - Supplier Portal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwindcss.config = {
        darkMode: 'class'
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/supplier_common.js"></script>
    <script src="../assets/js/darkmode.js"></script>
    <script src="../assets/js/pagination.js"></script>
    <link rel="stylesheet" href="../assets/css/darkmode.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      :root.dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #1f2937;
      }

      :root.dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #4b5563;
      }

      :root.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }

      :root.dark body {
        background-color: #111827;
        color: #f3f4f6;
      }

      :root.dark #app-content {
        background-color: #111827;
      }

      :root.dark header {
        background-color: #1f2937;
        border-bottom-color: #374151;
      }

      :root.dark .bg-white {
        background-color: #1f2937;
      }

      :root.dark .bg-slate-50 {
        background-color: #374151;
      }

      :root.dark .text-slate-900 {
        color: #f3f4f6;
      }

      :root.dark .text-slate-600 {
        color: #d1d5db;
      }

      :root.dark .text-slate-500 {
        color: #9ca3af;
      }

      :root.dark .border-slate-200 {
        border-color: #374151;
      }

      :root.dark .border-slate-100 {
        border-color: #374151;
      }

      :root.dark input {
        background-color: #374151;
        color: #f3f4f6;
      }

      :root.dark input::placeholder {
        color: #9ca3af;
      }

      :root.dark #sidebar {
        background-color: #1f2937;
        border-right-color: #374151;
      }

      :root.dark .bg-slate-900 {
        background-color: #1f2937;
      }

      :root.dark .bg-slate-800 {
        background-color: #374151;
      }

      :root.dark .hover\:bg-slate-800:hover {
        background-color: #2d3748;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-900 selection:bg-emerald-100 selection:text-emerald-900 overflow-hidden"
  >
    <div id="app-content" class="min-h-screen flex invisible">
      <!-- Sidebar - Supplier Theme (Greenish Navy) -->
      <aside
        id="sidebar"
        class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white transition-all duration-300 transform lg:relative lg:translate-x-0 border-r border-slate-800 flex flex-col"
      >
        <div class="p-8 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center">
              <img
                src="../assets/img/logo.png"
                alt="Logo SupplierHub"
                class="w-12 h-12 object-contain"
              />
            </div>
            <span class="text-xl font-bold tracking-tight"
              >SUPPLIER<span class="text-emerald-400">HUB</span></span
            >
          </div>
          <button onclick="toggleSidebar()" class="lg:hidden text-slate-400">
            <i data-lucide="x"></i>
          </button>
        </div>

        <nav
          class="mt-4 px-6 space-y-1.5 flex-1 overflow-y-auto custom-scrollbar"
        >
          <p
            class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4"
          >
            SUPPLIER MENU
          </p>
          <a
            href="supplier.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i
              data-lucide="layout-dashboard"
              class="group-hover:text-emerald-400"
            ></i>
            <span class="font-semibold text-sm">Dashboard</span>
          </a>
          <a
            href="supplier_produk_saya.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="package" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Produk Saya</span>
          </a>
          <a
            href="supplier_daftar_pesanan.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group bg-emerald-600 text-white shadow-xl shadow-emerald-900/40"
          >
            <i data-lucide="shopping-cart" class="text-white"></i>
            <span class="font-semibold text-sm">Daftar Pesanan</span>
          </a>
          <a
            href="supplier_notifikasi.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="bell-ring" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Notifikasi</span>
          </a>
          <a
            href="supplier_analitik.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i
              data-lucide="bar-chart-3"
              class="group-hover:text-emerald-400"
            ></i>
            <span class="font-semibold text-sm">Analitik Toko</span>
          </a>
          <a
            href="supplier_toko.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="settings" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Toko Saya</span>
          </a>
        </nav>

        <div class="px-6 pb-8">
          <button
            onclick="logoutUser('../Login/login.html')"
            class="w-full flex items-center justify-between px-4 py-3 text-slate-400 hover:text-red-400 transition-colors group"
          >
            <div class="flex items-center gap-3">
              <i data-lucide="log-out" size="20"></i>
              <span class="font-semibold text-sm">Keluar Sistem</span>
            </div>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header
          class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40"
        >
          <div class="flex items-center gap-4">
            <button
              onclick="toggleSidebar()"
              class="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg"
            >
              <i data-lucide="menu"></i>
            </button>
            <div>
              <h1 class="text-xl font-bold text-slate-900 tracking-tight">
                Daftar Pesanan
              </h1>
              <p class="text-xs text-slate-500 hidden md:block">
                Portal Mitra Supplier
              </p>
            </div>
          </div>
          <div class="flex items-center gap-6">
            <div
              class="hidden md:flex items-center bg-slate-50 rounded-xl px-4 py-2.5 w-72 border border-slate-200 focus-within:border-emerald-500 focus-within:bg-white focus-within:ring-4 focus-within:ring-emerald-500/5 transition-all"
            >
              <i data-lucide="search" class="text-slate-400 w-4 h-4"></i>
              <input
                id="supplier-order-search"
                type="text"
                placeholder="Cari Pesanan..."
                class="bg-transparent border-none focus:ring-0 text-sm w-full ml-2 outline-none placeholder:text-slate-400 text-slate-700"
              />
            </div>
            <div class="flex items-center gap-3">
              <div class="flex items-center gap-3 pl-2">
                <div class="text-right hidden sm:block">
                  <p
                    id="user-display-name"
                    class="text-sm font-bold text-slate-900 leading-none"
                  >
                    Supplier
                  </p>
                  <p
                    class="text-[10px] text-emerald-600 font-black uppercase tracking-widest mt-1.5"
                  >
                    Role: SUPPLIER
                  </p>
                </div>
                <div
                  class="w-11 h-11 rounded-xl bg-emerald-50 border-2 border-white shadow-sm overflow-hidden ring-1 ring-slate-200 flex py-1 justify-center"
                >
                  <i
                    data-lucide="store"
                    class="text-emerald-600 w-7 h-7 mt-1.5"
                  ></i>
                </div>
              </div>
            </div>
          </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
          <div
            class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8"
          >
            <div>
              <h2 class="text-2xl font-black text-slate-900 tracking-tight">
                Daftar Pesanan <span class="text-emerald-600 font-extrabold" data-supplier-name-display>Supplier</span>
              </h2>
              <p class="text-slate-500 text-sm">
                Kelola semua pesanan masuk dari UMKM.
              </p>
            </div>
            <div class="flex gap-2">
              <button
                onclick="exportOrders()"
                class="px-4 py-2 text-sm font-semibold text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors flex items-center gap-2"
              >
                <i data-lucide="download" class="w-4 h-4"></i> Export
              </button>
            </div>
          </div>

          <div class="flex gap-2 mb-6 overflow-x-auto pb-2 custom-scrollbar">
            <button
              data-order-filter="all"
              onclick="setOrderFilter('all')"
              class="px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Semua Pesanan
            </button>
            <button
              data-order-filter="needs_process"
              onclick="setOrderFilter('needs_process')"
              class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Perlu Diproses
            </button>
            <button
              data-order-filter="shipped"
              onclick="setOrderFilter('shipped')"
              class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Sedang Dikirim
            </button>
            <button
              data-order-filter="completed"
              onclick="setOrderFilter('completed')"
              class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Selesai
            </button>
          </div>

          <div
            class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden"
          >
            <div class="overflow-x-auto">
              <table class="w-full text-left">
                <thead>
                  <tr
                    class="bg-slate-50/50 text-slate-400 text-[10px] uppercase tracking-[0.2em] font-black border-b border-slate-100"
                  >
                    <th class="px-8 py-5">Pesanan & Produk</th>
                    <th class="px-8 py-5">Pemesan (UMKM)</th>
                    <th class="px-8 py-5 text-right">Total</th>
                    <th class="px-8 py-5 text-center">Status</th>
                    <th class="px-8 py-5 text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="supplier-orders-body" class="divide-y divide-slate-50">
                  <tr>
                    <td colspan="5" class="px-8 py-8 text-center text-sm text-slate-500">
                      Memuat pesanan...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div id="supplier-orders-pagination" class="px-8 pb-6"></div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let supplierOrders = [];
      let activeOrderFilter = "all";
      const ordersPagination = SupplierHubPagination.create({
        pageSize: 10,
        itemLabel: "pesanan",
      });

      function getOrderSearchQuery() {
        const input = document.getElementById("supplier-order-search");
        return input ? input.value.trim().toLowerCase() : "";
      }

      function orderMatchesFilter(order) {
        const status = String(order.status || "").toLowerCase();
        if (activeOrderFilter === "all") return true;
        if (activeOrderFilter === "needs_process") {
          return [
            "pending",
            "pending_supplier_confirmation",
            "supplier_confirmed",
            "payment_pending",
            "paid",
            "processing",
            "shipment_created",
          ].includes(status);
        }
        return status === activeOrderFilter;
      }

      function orderMatchesSearch(order) {
        const query = getOrderSearchQuery();
        if (!query) return true;

        return [
          order.id,
          order.product?.name,
          order.umkm?.business_name,
          order.umkm?.address,
          order.status,
        ].some((value) => String(value || "").toLowerCase().includes(query));
      }

      function getVisibleOrders() {
        return supplierOrders.filter(
          (order) => orderMatchesFilter(order) && orderMatchesSearch(order),
        );
      }

      function setOrderFilter(status) {
        activeOrderFilter = status;
        document.querySelectorAll("[data-order-filter]").forEach((button) => {
          const isActive = button.dataset.orderFilter === status;
          button.className = isActive
            ? "px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold whitespace-nowrap"
            : "px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap";
        });
        renderOrders();
      }

      function renderOrders(options = {}) {
        const tbody = document.getElementById("supplier-orders-body");
        const orders = getVisibleOrders();
        if (!options.preservePage) SupplierHubPagination.reset(ordersPagination);
        const pageData = SupplierHubPagination.getPage(orders, ordersPagination);

        if (orders.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" class="px-8 py-8 text-center text-sm text-slate-500">
                Tidak ada pesanan untuk filter ini.
              </td>
            </tr>
          `;
          SupplierHubPagination.render("supplier-orders-pagination", ordersPagination, [], {
            itemLabel: "pesanan",
          });
          return;
        }

        tbody.innerHTML = pageData.items
          .map((order) => {
            const meta = SupplierDashboard.statusMeta(order.status);
            let actionButton = `<button onclick="showOrderDetail('${SupplierDashboard.escapeHTML(order.id)}')" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-50 transition-all shadow-sm">Detail</button>`;
            if (meta.nextStatus) {
              if (meta.nextStatus === 'confirm') {
                actionButton = `
                  <div class="flex items-center justify-center gap-1.5">
                    <button onclick="changeOrderStatus('${SupplierDashboard.escapeHTML(order.id)}', 'confirm')" class="px-3 py-1.5 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition-all shadow-sm">Terima</button>
                    <button onclick="changeOrderStatus('${SupplierDashboard.escapeHTML(order.id)}', 'reject')" class="px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold rounded-lg transition-all shadow-sm">Tolak</button>
                  </div>
                `;
              } else {
                actionButton = `<button onclick="changeOrderStatus('${SupplierDashboard.escapeHTML(order.id)}', '${meta.nextStatus}')" class="px-3 py-1.5 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition-all shadow-sm">${meta.actionLabel}</button>`;
              }
            }

            return `
              <tr class="hover:bg-slate-50 transition-colors">
                <td class="px-8 py-5">
                  <span class="text-xs font-bold text-slate-400 block mb-1">${SupplierDashboard.shortID(order.id)}</span>
                  <span class="text-sm font-bold text-slate-900 block line-clamp-1">
                    ${SupplierDashboard.escapeHTML(order.product?.name || "Produk")} (${order.quantity || 0}x)
                  </span>
                </td>
                <td class="px-8 py-5">
                  <span class="text-sm text-slate-900 font-semibold block">${SupplierDashboard.escapeHTML(order.umkm?.business_name || "UMKM")}</span>
                  <span class="text-xs text-slate-500">${SupplierDashboard.escapeHTML(order.umkm?.address || "-")}</span>
                </td>
                <td class="px-8 py-5 text-right font-black text-slate-900">
                  ${SupplierDashboard.formatRupiah(order.grand_total)}
                </td>
                <td class="px-8 py-5 text-center">
                  <span class="text-[10px] font-black px-3 py-1 rounded-full ${meta.className}">
                    ${meta.label}
                  </span>
                </td>
                <td class="px-8 py-5 text-center">${actionButton}</td>
              </tr>
            `;
          })
          .join("");
        SupplierHubPagination.render("supplier-orders-pagination", ordersPagination, orders, {
          itemLabel: "pesanan",
          onPageChange: () => renderOrders({ preservePage: true }),
        });
      }

      async function fetchOrders() {
        try {
          supplierOrders = await SupplierDashboard.getOrders();
          renderOrders();
        } catch (error) {
          document.getElementById("supplier-orders-body").innerHTML = `
            <tr>
              <td colspan="5" class="px-8 py-8 text-center text-sm text-red-500">
                Gagal memuat daftar pesanan.
              </td>
            </tr>
          `;
          SupplierHubPagination.render("supplier-orders-pagination", ordersPagination, [], {
            itemLabel: "pesanan",
          });
        }
      }

      async function changeOrderStatus(orderID, nextStatus) {
        try {
          await SupplierDashboard.updateOrderStatus(orderID, nextStatus);
          SupplierDashboard.notify("success", "Status pesanan berhasil diperbarui.");
          await fetchOrders();
        } catch (error) {
          SupplierDashboard.notify("danger", error.message || "Gagal memperbarui status pesanan.");
        }
      }

      function showOrderDetail(orderID) {
        const order = supplierOrders.find((item) => String(item.id) === String(orderID));
        if (!order) return;

        showAlert(
          [
            `Pesanan: ${SupplierDashboard.shortID(order.id)}`,
            `Produk: ${order.product?.name || "-"}`,
            `UMKM: ${order.umkm?.business_name || "-"}`,
            `Status: ${order.status || "-"}`,
            `Total: ${SupplierDashboard.formatRupiah(order.grand_total)}`,
          ].join("\n")
        );
      }

      function exportOrders() {
        const rows = getVisibleOrders();
        if (rows.length === 0) {
          SupplierDashboard.notify("warning", "Tidak ada data pesanan untuk diekspor.");
          return;
        }

        const header = ["ID", "Produk", "UMKM", "Jumlah", "Total", "Status"];
        const csvRows = rows.map((order) =>
          [
            order.id,
            order.product?.name || "",
            order.umkm?.business_name || "",
            order.quantity || 0,
            order.grand_total || 0,
            order.status || "",
          ]
            .map((value) => `"${String(value).replace(/"/g, '""')}"`)
            .join(","),
        );

        const blob = new Blob([[header.join(","), ...csvRows].join("\n")], {
          type: "text/csv;charset=utf-8;",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "pesanan-supplier.csv";
        link.click();
        URL.revokeObjectURL(url);
      }

      function setupOrderSearch() {
        const input = document.getElementById("supplier-order-search");
        const params = new URLSearchParams(window.location.search);
        const initialFilter = params.get("filter") || "all";

        if (document.querySelector(`[data-order-filter="${initialFilter}"]`)) {
          setOrderFilter(initialFilter);
        }

        if (!input) return;

        const initialQuery = params.get("q") || "";
        input.value = initialQuery;
        input.addEventListener("input", renderOrders);
      }

      window.addEventListener("DOMContentLoaded", () => {
        SupplierDashboard.initPage({
          onReady: async () => {
            setupOrderSearch();
            await fetchOrders();
          },
        });
      });
    </script>
  </body>
</html>
